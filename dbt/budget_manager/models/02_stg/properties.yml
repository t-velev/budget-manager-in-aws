models:

# ---------------------------------------
# STG_ACCOUNT
# ---------------------------------------
  - name: stg_account
    description: "List of savings accounts."
    config:
      materialized: view
      unique_key: account_id_bk
    columns:
      # ---------------------
      - name: account_id_bk
        data_tests:
          - unique
          - not_null
      # ---------------------
      - name: account_name
        data_tests:
          - not_null
      # ---------------------
      - name: is_archived
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['true', 'false', '-1']
      # ---------------------
      - name: created_time
        data_tests:
          - not_null
      # ---------------------
      - name: last_edited_time
        data_tests:
          - not_null


# ---------------------------------------
# STG_BUDGET
# ---------------------------------------
  - name: stg_budget
    description: "Monthly budget amount for each subcategory"
    config:
      materialized: view
      unique_key: budget_id_bk
    columns:
      # ---------------------
      - name: budget_id_bk
        data_tests:
          - unique
          - not_null
      # ---------------------
      - name: budget_name
      # ---------------------
      - name: year_id           # No not_null test. Handled gracefully by -1 system record.
      # ---------------------
      - name: month_id          # No not_null test. Handled gracefully by -1 system record.
      # ---------------------
      - name: category_id       # No not_null test. Handled gracefully by -1 system record.
      # ---------------------
      - name: subcategory_id    # No not_null test. Handled gracefully by -1 system record.
      # ---------------------
      - name: budget_amount
      # ---------------------
      - name: is_archived
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['true', 'false', '-1']
      # ---------------------
      - name: created_time
        data_tests:
          - not_null
      # ---------------------
      - name: last_edited_time
        data_tests:
          - not_null


# ---------------------------------------
# STG_CATEGORY
# ---------------------------------------
  - name: stg_category
    description: "List of budget categories."
    config:
      materialized: view
      unique_key: category_id_bk
    columns:
      # ---------------------
      - name: category_id_bk
        data_tests:
          - unique
          - not_null
      # ---------------------
      - name: category_name
        data_tests:
          - not_null
      # ---------------------
      - name: category_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Приход', 'Разход', '-1']
      # ---------------------
      - name: is_archived
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['true', 'false', '-1']
      # ---------------------
      - name: created_time
        data_tests:
          - not_null
      # ---------------------
      - name: last_edited_time
        data_tests:
          - not_null


# ---------------------------------------
# STG_MONTH
# ---------------------------------------
  - name: stg_month
    description: "List of months of the year."
    config:
      materialized: view
      unique_key: month_id_bk
    columns:
      # ---------------------
      - name: month_id_bk
        data_tests:
          - unique
          - not_null
      # ---------------------
      - name: month_name
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['January', 'February', 'March', 'April', 'May', 'June', 'July',
                         'August', 'September', 'October', 'November', 'December', '-1']
      # ---------------------
      - name: created_time
        data_tests:
          - not_null
      # ---------------------
      - name: last_edited_time
        data_tests:
          - not_null


