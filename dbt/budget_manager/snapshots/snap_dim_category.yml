snapshots:
  - name: dim_category
    relation: ref('stg_category')
    config:
      schema: warehouse
      unique_key: category_id_bk
      check_cols:
        - category_id_bk
        - category_name
        - category_type
        - is_archived

      post_hook:
        # Create Primary key
        - "{{ create_pk('dk') }}"

        # Create Unique index
        - "{{ create_ui(['category_name', 'scd2_valid_to']) }}"

        # Apply Not null
        - "{{ apply_not_null('category_id_bk') }}"
        - "{{ apply_not_null('category_name') }}"
        - "{{ apply_not_null('is_archived') }}"
        - "{{ apply_not_null('category_type') }}"
        - "{{ apply_not_null('created_time') }}"
        - "{{ apply_not_null('last_edited_time') }}"

        # Insert new and deleted count into sys_etl_stats
        - "{{ insert_new_into_stats('warehouse', 'dim_category', 'sys_etl_stats')}}"
        - "{{ insert_deleted_into_stats('warehouse', 'dim_category', 'sys_etl_stats')}}"        