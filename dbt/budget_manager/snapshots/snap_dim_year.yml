snapshots:
  - name: dim_year
    relation: ref('stg_year')
    config:
      schema: warehouse
      unique_key: year_id_bk
      check_cols:
        - year_id_bk
        - year_name
        
      post_hook:
        # Create Primary key
        - "{{ create_pk('dk') }}"

        # Create Unique index
        - "{{ create_ui(['year_name', 'scd2_valid_to']) }}"

        # Apply Not null
        - "{{ apply_not_null('year_id_bk') }}"
        - "{{ apply_not_null('year_name') }}"
        - "{{ apply_not_null('created_time') }}"
        - "{{ apply_not_null('last_edited_time') }}"

        # Insert new and deleted count into sys_etl_stats
        - "{{ insert_new_into_stats('warehouse', 'dim_year', 'sys_etl_stats')}}"
        - "{{ insert_deleted_into_stats('warehouse', 'dim_year', 'sys_etl_stats')}}"