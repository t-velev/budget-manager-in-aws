snapshots:
  - name: dim_account
    relation: ref('stg_account')
    config:
      schema: warehouse
      unique_key: account_id_bk
      check_cols:
        - account_id_bk
        - account_name
        - is_archived     

      post_hook:
        # Create Primary key
        - "{{ create_pk('dk') }}"

        # Create Unique index
        - "{{ create_ui(['account_name', 'scd2_valid_to']) }}"

        # Apply Not null
        - "{{ apply_not_null('account_id_bk') }}"
        - "{{ apply_not_null('account_name') }}"
        - "{{ apply_not_null('is_archived') }}"
        - "{{ apply_not_null('created_time') }}"
        - "{{ apply_not_null('last_edited_time') }}"

        # Insert new and deleted count into sys_etl_stats
        - "{{ insert_new_into_stats('warehouse', 'dim_account', 'sys_etl_stats')}}"
        - "{{ insert_deleted_into_stats('warehouse', 'dim_account', 'sys_etl_stats')}}"
