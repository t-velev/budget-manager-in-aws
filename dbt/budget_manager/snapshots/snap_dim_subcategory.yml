snapshots:
  - name: dim_subcategory
    relation: ref('stg_subcategory')
    config:
      schema: warehouse
      unique_key: subcategory_id_bk
      check_cols:
        - subcategory_id_bk
        - subcategory_name
        - subcategory_type
        - priority
        - due_date
        - is_archived
        
      post_hook:
        # Create Primary key
        - "{{ create_pk('dk') }}"

        # Create Unique index
        - "{{ create_ui(['subcategory_name', 'scd2_valid_to']) }}"

        # Apply Not null
        - "{{ apply_not_null('subcategory_id_bk') }}"
        - "{{ apply_not_null('subcategory_name') }}"
        - "{{ apply_not_null('subcategory_type') }}"
        - "{{ apply_not_null('is_archived') }}"
        - "{{ apply_not_null('created_time') }}"
        - "{{ apply_not_null('last_edited_time') }}"

        # Insert new and deleted count into sys_etl_stats
        - "{{ insert_new_into_stats('warehouse', 'dim_subcategory', 'sys_etl_stats')}}"
        - "{{ insert_deleted_into_stats('warehouse', 'dim_subcategory', 'sys_etl_stats')}}"        